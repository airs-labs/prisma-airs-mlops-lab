<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Security Advisor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* Effects */
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .message-appear {
            animation: slideIn 0.3s ease-out forwards;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background-color: #94a3b8;
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 h-screen flex flex-col overflow-hidden bg-[url('https://tailwindcss.com/_next/static/media/hero-dark.9a75db18.jpg')] bg-cover bg-center">

    <!-- Header -->
    <header class="glass-panel h-16 flex items-center justify-between px-6 z-10">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center shadow-lg shadow-blue-500/20">
                <i class="fa-solid fa-shield-halved text-white text-sm"></i>
            </div>
            <h1 class="text-lg font-semibold tracking-wide">Cloud Security Advisor <span class="text-xs font-normal text-slate-400 bg-slate-800 px-2 py-0.5 rounded-full ml-2">BETA</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <div id="status-indicator" class="flex items-center gap-2 text-xs text-emerald-400 bg-emerald-500/10 px-3 py-1.5 rounded-full border border-emerald-500/20">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
                System Online
            </div>
        </div>
    </header>

    <!-- Chat Area -->
    <main id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 scroll-smooth">
        <!-- Welcome Message -->
        <div class="flex justify-center mb-8">
            <div class="glass-panel p-6 rounded-2xl max-w-2xl text-center space-y-3">
                <div class="w-12 h-12 bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-2 text-2xl">👋</div>
                <h2 class="text-xl font-medium text-white">How can I secure your infrastructure?</h2>
                <p class="text-slate-400 text-sm">I am trained on NIST cybersecurity guidelines. Ask me about S3 permissions, IAM policies, or network segmentation.</p>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-2 mt-4">
                    <button onclick="setInput('Is it safe to open port 22 to 0.0.0.0/0?')" class="text-xs bg-slate-800 hover:bg-slate-700 text-slate-300 py-2 px-3 rounded-lg transition text-left truncate border border-slate-700">
                        SSH Security Best Practices
                    </button>
                    <button onclick="setInput('How do I encrypt an RDS database?')" class="text-xs bg-slate-800 hover:bg-slate-700 text-slate-300 py-2 px-3 rounded-lg transition text-left truncate border border-slate-700">
                        RDS Encryption Guide
                    </button>
                </div>
            </div>
        </div>
        <!-- Messages will be injected here -->
    </main>

    <!-- Input Area -->
    <div class="p-4 md:p-6 bg-slate-950/80 backdrop-blur-md border-t border-slate-800">
        <div class="max-w-4xl mx-auto relative group">
            <div class="absolute -inset-0.5 bg-gradient-to-r from-blue-500 to-cyan-500 rounded-xl opacity-20 group-hover:opacity-40 transition duration-300 blur"></div>
            <form id="chat-form" class="relative flex items-end gap-2 bg-slate-900 rounded-xl p-2 border border-slate-800 shadow-2xl">
                <textarea 
                    id="user-input" 
                    rows="1" 
                    class="w-full bg-transparent text-slate-200 placeholder-slate-500 text-sm p-3 focus:outline-none resize-none max-h-32"
                    placeholder="Ask a security question..."
                    oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"
                    onkeydown="if(event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); sendMessage(); }"
                ></textarea>
                <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-white p-3 rounded-lg transition-all shadow-lg hover:shadow-blue-500/30">
                    <i class="fa-solid fa-paper-plane text-sm"></i>
                </button>
            </form>
            <div class="text-center mt-2">
                <p class="text-[10px] text-slate-500">AI responses should be verified against official NIST documentation.</p>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const chatForm = document.getElementById('chat-form');
        const statusIndicator = document.getElementById('status-indicator');

        // Check health on load
        fetch('/health').then(res => res.json()).then(data => {
            if (data.mode === 'mock') {
                statusIndicator.innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-yellow-400"></span> Mock Mode';
                statusIndicator.className = "flex items-center gap-2 text-xs text-yellow-400 bg-yellow-500/10 px-3 py-1.5 rounded-full border border-yellow-500/20";
            }
        }).catch(err => {
            statusIndicator.innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-red-500"></span> Disconnected';
            statusIndicator.className = "flex items-center gap-2 text-xs text-red-400 bg-red-500/10 px-3 py-1.5 rounded-full border border-red-500/20";
        });

        function setInput(text) {
            userInput.value = text;
            userInput.focus();
        }

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} message-appear`;
            
            const bubble = document.createElement('div');
            bubble.className = `max-w-[80%] rounded-2xl px-5 py-3 text-sm leading-relaxed shadow-md ${
                role === 'user' 
                ? 'bg-blue-600 text-white rounded-br-none' 
                : 'bg-slate-800 text-slate-200 border border-slate-700 rounded-bl-none'
            }`;
            
            // Allow basic markdown-like rendering (newlines)
            bubble.innerHTML = text.replace(/\n/g, '<br>');
            
            div.appendChild(bubble);
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.id = 'typing-indicator';
            div.className = 'flex justify-start message-appear';
            div.innerHTML = `
                <div class="bg-slate-800 border border-slate-700 rounded-2xl rounded-bl-none px-4 py-3 flex items-center gap-1">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeTyping() {
            const el = document.getElementById('typing-indicator');
            if (el) el.remove();
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // Add user message
            appendMessage('user', message);
            userInput.value = '';
            userInput.style.height = 'auto';

            // Show typing
            showTyping();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                
                const data = await response.json();
                removeTyping();
                
                // Add bot message
                appendMessage('assistant', data.reply);
                
            } catch (error) {
                removeTyping();
                appendMessage('assistant', '⚠️ Error connecting to server. Please try again.');
                console.error(error);
            }
        }

        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            sendMessage();
        });
    </script>
</body>
</html>
