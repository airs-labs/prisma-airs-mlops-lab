lab:
  id: "prisma-airs-mlops-lab"
  name: "AIRS Model Security MLOps Lab"
  version: "2.0.0"
  modules: 8
  estimated_time: "4 hours"

scenario: ""

leaderboard:
  url: "https://airs-leaderboard.seanyoungberg.workers.dev"
  lab_id: "mlops"

scenarios:
  ts-workshop:
    display_name: "Technical Services Workshop (Instructor-Led)"
    hard_stops: true
    leaderboard: true
  ts-self-paced:
    display_name: "Technical Services Self-Paced"
    hard_stops: false
    leaderboard: true
  internal:
    display_name: "Internal Teams"
    hard_stops: false
    leaderboard: false
  public:
    display_name: "Public / Self-Guided"
    hard_stops: false
    leaderboard: false

requirements:
  cli_tools:
    - { name: "gcloud", check: "gcloud version", required: true }
    - { name: "python3", check: "python3 --version", required: true }
    - { name: "git", check: "git version", required: true }
  gcp:
    - { name: "GCP auth", check: "gcloud auth list", blocker: "gcp-auth-missing" }
    - { name: "GCP project", check: "gcloud config get-value project", blocker: "gcp-project-invalid" }
    - { name: "AI Platform API", check: "gcloud services list --enabled --filter=aiplatform.googleapis.com --format='value(NAME)'", blocker: false }
    - { name: "Artifact Registry API", check: "gcloud services list --enabled --filter=artifactregistry.googleapis.com --format='value(NAME)'", blocker: false }
  airs:
    - { name: "SCM access", description: "Login to apps.paloaltonetworks.com", when: "module-0" }
    - { name: "TSG with credit pool", description: "Active tenant with AIRS credits", when: "module-0" }
    - { name: "Model Security SA credentials", description: "Service account with Model Security role", when: "module-2" }
  mcp:
    - { name: "Web search", description: "MCP server for web search", required: true }
